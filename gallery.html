<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="hero-banner">
            <img src="assets/Flag-Peru.png" alt="Peru Flag" class="flag-image">
            <h1 class="hero-title">Visit Peru</h1>
        </div>
        
        <nav class="main-nav">
            <ul class="nav-links">
              <li><a href="index.html">Home</a></li>
              <li><a href="attractions.html">Top Attractions</a></li>
              <li><a href="guide.html">Guide</a></li>
              <li><a href="gallery.html">Gallery</a></li>
            </ul>
        </nav>
    </header>

    <main class="gallery-page">
        <h2 class="gallery-title">Photo Gallery</h2>
        <p class="gallery-intro">Explore beautiful destinations across Peru.</p>
      
        <ul class="gallery-carousel-advanced">
          <li class="gallery-tile">
            <img src="assets/machu-picchu.jpg" alt="Machu Picchu">
            <h3>Machu Picchu</h3>
          </li>
          <li class="gallery-tile">
            <img src="assets/sacred-valley.jpg" alt="Sacred Valley">
            <h3>Sacred Valley</h3>
          </li>
          <li class="gallery-tile">
            <img src="assets/cusco.jpg" alt="Cusco">
            <h3>Cusco</h3>
          </li>
          <li class="gallery-tile">
            <img src="assets/lake-titicaca.jpg" alt="Lake Titicaca">
            <h3>Lake Titicaca</h3>
          </li>
          <li class="gallery-tile">
            <img src="assets/nazca-lines.jpg" alt="Nazca Lines">
            <h3>Nazca Lines</h3>
          </li>
          <li class="gallery-tile">
            <img src="assets/arequipa.jpg" alt="Arequipa">
            <h3>Arequipa</h3>
          </li>
        </ul>
      </main>
</body>
</html>
